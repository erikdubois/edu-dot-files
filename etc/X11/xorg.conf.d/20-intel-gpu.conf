Section "Device"
    Identifier      "Intel Graphics"
    Driver          "intel"
    Option          "Tiling"            "yes"
    Option          "Acceleration"      "yes"
    Option          "AccelMethod"       "sna"

    # Reduce GPU command stream overhead for smoother input
    Option          "DRI"               "3"

    # Disable vsync to prevent GPU stalls during heavy I/O
    # Mouse input won't wait for vertical retrace
    Option          "TearFree"          "false"

    # Lower presentation interval for more responsive feel
    Option          "TripleBuffer"      "false"

    # Optimize for interactive responsiveness over smooth animation
    Option          "SwapbuffersWait"   "false"
EndSection
