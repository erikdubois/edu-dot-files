# ============================================================================
# Kiro-ISO Systemd Journal Configuration
# ============================================================================
# Optimizes journald for minimal storage while keeping critical logs
# See: man journald.conf

[Journal]

# ============================================================================
# Storage Strategy - Where logs are kept
# ============================================================================

# "volatile" = keep in RAM only (/run/log/journal)
#   Pro: Fastest, no disk I/O, no log bloat
#   Con: Logs lost on reboot
#
# "persistent" = keep on disk (/var/log/journal)
#   Pro: Logs survive reboot
#   Con: Uses disk space, slower
#
# "auto" = persistent if /var/log/journal exists, else volatile
#   Pro: Flexible, default behavior
#   Con: Unpredictable
#
# Recommendation for Kiro-ISO: "volatile" (live system, minimal footprint)
# For servers: "persistent" with size limits
Storage=volatile

# ============================================================================
# Size Limits - Prevent journal from growing unbounded
# ============================================================================

# Maximum size of journal on disk
# Default: 10% of filesystem (can be 2-5GB on large drives)
# Recommendation: 100M for servers, 50M for desktops
SystemMaxUse=100M

# Maximum size per journal file (auto-rotate when exceeded)
# Default: 128M
# Recommendation: 50M (more frequent rotation, easier cleanup)
SystemMaxFileSize=50M

# Minimum disk space to keep free (drops logs if exceeded)
# Default: 15% of filesystem
# Recommendation: 500M (aggressive, prevents disk full)
SystemMinKeepFree=500M

# Maximum number of journal files to keep
# Default: unlimited
# Recommendation: 10 (auto-delete old journals)
SystemMaxFiles=10

# ============================================================================
# Runtime Limits (RAM storage, when using volatile)
# ============================================================================

# Max journal size in memory (/run/log/journal)
# Default: 10% of RAM
# Recommendation: 32M (limits RAM usage)
RuntimeMaxUse=32M

# Max size per runtime journal file
# Default: 16M
# Recommendation: 16M
RuntimeMaxFileSize=16M

# Minimum free RAM before dropping logs
# Default: 5% of RAM
# Recommendation: 64M (aggressive)
RuntimeMinKeepFree=64M

# Maximum number of runtime journal files
# Default: unlimited
# Recommendation: 8
RuntimeMaxFiles=8

# ============================================================================
# Log Level and Filtering - Reduce noise
# ============================================================================

# Minimum log level: "emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"
# Default: "info" (includes informational messages)
# Recommendation: "warning" (only important messages)
# For debugging: "info" or "debug"
MaxLevelStore=warning
MaxLevelSyslog=warning
MaxLevelKMsg=warning

# ============================================================================
# Log Forwarding - Where logs go
# ============================================================================

# Forward logs to syslog? (usually not needed with journalctl)
# Default: yes
# Recommendation: no (reduce redundancy)
ForwardToSyslog=no

# Forward to kernel log buffer (dmesg)
# Default: yes
# Recommendation: yes (useful for kernel debugging)
ForwardToKMsg=yes

# Forward to system console
# Default: no
# Recommendation: no (unless debugging boot)
ForwardToConsole=no

# ============================================================================
# Compression - Save disk space (persistent storage only)
# ============================================================================

# Compress old journal files on disk
# Default: yes
# Recommendation: yes (saves 50-70% space)
Compress=yes

# Seal journal files (cryptographically sign for integrity)
# Default: yes
# Recommendation: no (minimal performance cost benefit for desktop)
Seal=no

# ============================================================================
# Synchronization - Balance speed vs. safety
# ============================================================================

# Sync journal to disk immediately or buffer in memory
# "off" = fastest, loses logs if system crashes
# "volatile" = compromise, sync every 5min
# "persistent" = safe, syncs immediately (slowest)
# Default: "auto" (depends on disk type)
# Recommendation: "volatile" (good balance)
SyncIntervalSec=300

# ============================================================================
# Special Handling
# ============================================================================

# Keep audit log separate (for compliance, mostly servers)
# Default: yes
# Recommendation: no (not needed for desktops)
SplitMode=none

# Enable audit capability
# Default: yes
# Recommendation: no (reduce overhead)
Audit=no

# ============================================================================
# Rate Limiting - Prevent log spam
# ============================================================================

# Rate limit per interval: prevent one service from filling journal
# Default: 200 messages per 5 seconds
# Recommendation: keep default or increase to 500 for debugging
RateLimitIntervalSec=5s
RateLimitBurst=200

# Per-service rate limiting
# Recommendation: keep default
RateLimitInterval=0
RateLimitBurst=0
