# ============================================================================
# Kiro-ISO Systemd User Session Configuration
# ============================================================================
# Optimizes per-user systemd sessions (for login shells, GUI apps, etc.)

[Manager]

# ============================================================================
# Timeouts - User session responsiveness
# ============================================================================

# Timeout for user services to start
# Default: 90 seconds
# Recommendation: 15s (users can retry)
DefaultTimeoutStartSec=15s

# Timeout for user services to stop
# Default: 90 seconds
# Recommendation: 5s (faster logout)
DefaultTimeoutStopSec=5s

# ============================================================================
# Resource Limits - Per-user
# ============================================================================

# File descriptors for user services (usually less than system)
# Default: 65535
# Recommendation: keep default
DefaultLimitNOFILE=65535

# Processes per user
# Default: 30000
# Recommendation: keep default
DefaultLimitNPROC=30000

# ============================================================================
# Session Management
# ============================================================================

# Keep user session alive even if user logs out
# Default: no
# Recommendation: no (clean logout)
KillUserProcesses=no

# Timeout before killing remaining user processes after logout
# Default: 100ms
# Recommendation: 1s (give processes time to clean up)
KillOnlyUsers=

# ============================================================================
# Logging
# ============================================================================

# Log level for user session
# Default: info
# Recommendation: warning (reduce noise in user logs)
LogLevel=warning

# ============================================================================
# Environment
# ============================================================================

# User environment variables
# LANG is inherited from system.conf
DefaultEnvironment="TZ=UTC"
