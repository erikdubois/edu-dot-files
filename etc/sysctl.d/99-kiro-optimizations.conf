# ============================================================================
# Kiro-ISO System Optimization - Sysctl Parameters
# ============================================================================
# These optimizations enhance system responsiveness and performance
# while maintaining stability across various hardware configurations

# ============================================================================
# Memory Management - Balances RAM usage with swap and cache
# ============================================================================

# Aggressive swap usage (100) = swap and cache treated equally
# This is ideal for systems where responsiveness matters more than swap avoidance
vm.swappiness = 100

# Reduce inode/dentry cache reclamation pressure
# Lower value = keep more cache in memory
# Good for systems with adequate RAM
vm.vfs_cache_pressure = 50

# Dirty page thresholds - when to start writing to disk
# 256MB threshold for dirty pages
vm.dirty_bytes = 268435456

# Background flushing starts at 64MB of dirty data
vm.dirty_background_bytes = 67108864

# How often to flush dirty data to disk (15 seconds)
# More aggressive flushing = more responsive system
vm.dirty_writeback_centisecs = 1500

# Page cluster setting for swap
# 0 = read single pages (best for SSD/ZRAM)
# 1-2 = read clusters (better for physical HDD swap)
vm.page-cluster = 0

# ============================================================================
# Kernel Performance
# ============================================================================

# Disable NMI watchdog for better performance
# NMI watchdog is rarely needed on modern systems
kernel.nmi_watchdog = 0

# Allow unprivileged user namespace cloning
# Essential for containers and modern applications
kernel.unprivileged_userns_clone = 1

# Suppress kernel messages from console
# Cleaner boot and less noise
kernel.printk = 3 3 3 3

# Restrict kernel pointer visibility for security
kernel.kptr_restrict = 2

# ============================================================================
# Networking - Better packet handling
# ============================================================================

# Increase network device backlog queue
# Prevents packet loss under high traffic
net.core.netdev_max_backlog = 4096

# ============================================================================
# File System
# ============================================================================

# Increase maximum file descriptors
# Essential for modern applications
fs.file-max = 2097152

# Maximum number of memory map areas a process can have
# Very high value allows applications with many memory maps to function properly
# Common needed for development tools, databases, and large applications
vm.max_map_count = 2147483642

# ============================================================================
# Optional: Additional optimizations for keyboard-driven workflow
# ============================================================================

# Reduce context switching overhead
# Lower values = less frequent context switch cost calculations
# Useful for latency-sensitive applications
# kernel.sched_migration_cost_ns = 5000000

# Improve disk I/O responsiveness by disabling zone reclaim
# Set to 0: disabled (recommended for most systems)
# Set to 1: enabled (for NUMA systems with multiple zones)
# vm.zone_reclaim_mode = 0

# ============================================================================
# Kernel Hardening & Security Parameters
# ============================================================================
# Based on 930-real-metal.sh security profile
# Enhances system security while maintaining usability

# Restrict SysRq kernel command key access
# Prevents unauthorized users from triggering dangerous kernel functions
kernel.sysrq = 0

# Restrict kernel pointer visibility in /proc
# Prevents information leakage about kernel memory layout
# Value 2 = restrict to CAP_SYS_ADMIN (admin only)
kernel.kptr_restrict = 2

# Restrict access to dmesg kernel log buffer
# Prevents unprivileged users from reading sensitive kernel messages
kernel.dmesg_restrict = 1

# Restrict ptrace scope for user processes
# Value 2 = only parents can trace (prevents unauthorized debugging)
kernel.yama.ptrace_scope = 2

# Disable unprivileged BPF (Berkeley Packet Filter) operations
# Prevents unprivileged users from loading BPF programs
# Important for kernel security hardening
kernel.unprivileged_bpf_disabled = 1

# Restrict performance event counter access
# Value 3 = restrict perf to CAP_SYS_ADMIN (admin only)
# Prevents unprivileged users from profiling the kernel
kernel.perf_event_paranoid = 3

# ============================================================================
# Core Dump Restrictions
# ============================================================================

# Append process ID to core dump filenames
# Makes core dumps unique per process, preventing overwrites
kernel.core_uses_pid = 1

# Disable core dumps for SUID/SGID binaries
# Value 0 = core dumps disabled (more secure)
# Prevents leaking sensitive information through core dumps
fs.suid_dumpable = 0

# Redirect core dump operations to /bin/false (disable them completely)
# Prevents any core dump generation at all
# Useful for production systems where core dumps are not needed
kernel.core_pattern = |/bin/false
